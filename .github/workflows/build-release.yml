name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  IDF_VERSION: v5.3

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: [ASICOS_BOARD_V1, ASICOS_BOARD_NERDQAXEPP, ASICOS_BOARD_BITFORGE_NANO]
        include:
          - board: ASICOS_BOARD_V1
            board_name: asicos-v1
          - board: ASICOS_BOARD_NERDQAXEPP
            board_name: nerdqaxepp
          - board: ASICOS_BOARD_BITFORGE_NANO
            board_name: bitforge-nano

    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          target: esp32s3
          command: |
            set -e
            echo "CONFIG_${{ matrix.board }}=y" >> sdkconfig.defaults
            idf.py set-target esp32s3
            idf.py build

            mkdir -p artifacts
            cp build/AsicOS.bin artifacts/AsicOS-${{ matrix.board_name }}-fw.bin
            cp build/bootloader/bootloader.bin artifacts/AsicOS-${{ matrix.board_name }}-bootloader.bin
            cp build/partition_table/partition-table.bin artifacts/AsicOS-${{ matrix.board_name }}-partitions.bin

            # Merged binary for one-shot flashing
            # Use offsets from build output (flash_args)
            esptool.py --chip esp32s3 merge_bin \
              --output artifacts/AsicOS-${{ matrix.board_name }}-merged.bin \
              --flash_mode dio --flash_size 16MB \
              0x0 build/bootloader/bootloader.bin \
              0x8000 build/partition_table/partition-table.bin \
              0x20000 build/AsicOS.bin

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: fw-${{ matrix.board_name }}
          path: artifacts/

  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build UI
        working-directory: ui
        run: |
          npm install
          npx vue-tsc --noEmit || true
          npx vite build

      - name: Upload www dist
        uses: actions/upload-artifact@v4
        with:
          name: www
          path: build/www/

  release-beta:
    needs: [build-firmware, build-ui]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create beta release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta-${{ steps.sha.outputs.short }}
          name: "Beta Build ${{ steps.sha.outputs.short }}"
          prerelease: true
          generate_release_notes: true
          body: |
            ## AsicOS Beta Build

            Automated beta from `main` at `${{ github.sha }}`.

            ### Downloads
            | File | Description |
            |------|-------------|
            | `AsicOS-<board>-merged.bin` | Complete flash image (bootloader + partitions + firmware) |
            | `AsicOS-<board>-fw.bin` | Firmware only (for OTA updates) |
            | `AsicOS-<board>-bootloader.bin` | Bootloader |
            | `AsicOS-<board>-partitions.bin` | Partition table |

            ### Web Flasher
            Visit **[asicos.io/flash](https://nathanmarlor.github.io/AsicOS/)** to flash from your browser (Chrome/Edge, USB required).

            ### Manual Flash (fresh install)
            ```bash
            esptool.py --chip esp32s3 --port /dev/ttyUSB0 --baud 460800 \
              erase_flash && \
            esptool.py --chip esp32s3 --port /dev/ttyUSB0 --baud 460800 \
              write_flash 0x0 AsicOS-<board>-merged.bin
            ```

            ### OTA Update (existing install)
            Upload `AsicOS-<board>-fw.bin` via the web UI at Settings > OTA.

            > **Beta**: Automated pre-release build. Use at your own risk.
          files: |
            release-assets/fw-asicos-v1/*
            release-assets/fw-nerdqaxepp/*
            release-assets/fw-bitforge-nano/*
            release-assets/www/*
